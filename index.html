<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Music TTML Extractor & Formatter</title>
    
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <style>
        /* Import SF Pro Variable Font */
        @font-face {
            font-family: "SF Pro";
            src: url("https://raw.githubusercontent.com/sahibjotsaggu/San-Francisco-Pro-Fonts/master/SF-Pro.ttf") format("truetype");
            font-display: swap;
        }

        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #fa243c; /* Apple Music Red */
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --border-color: #333333;
        }

        body {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, sans-serif;
            font-variation-settings: "opsz" 18;
            font-weight: 400;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: "SF Pro", -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 28px;
            font-variation-settings: "opsz" 28;
            font-weight: 590; /* Semibold */
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            font-family: inherit;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--text-color);
            cursor: pointer;
        }

        .checkbox-group input {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="text"], textarea {
            font-family: inherit;
            width: 100%;
            background-color: #2c2c2e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            padding: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            font-family: monospace;
            resize: vertical;
            height: 150px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        pre {
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.5;
            max-height: 350px;
            white-space: pre-wrap;
        }

        button.action-btn {
            font-family: inherit;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.action-btn:hover {
            opacity: 0.9;
        }

        .copy-btn {
            font-family: inherit;
            background-color: #2c2c2e;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .split-controls {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .split-btn {
            font-family: inherit;
            background-color: #2c2c2e;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .split-btn:hover {
            background-color: rgba(250, 36, 60, 0.1);
        }

        .error {
            color: #ff453a;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .preview-container {
            margin-top: 20px;
            padding: 15px;
            background: #151515;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .song-meta {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .lyrics-line {
            margin: 6px 0;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .bg-vocal-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <img src="icon.svg" alt="Lyrics Icon" width="34" height="34" style="display: inline-block; vertical-align: middle;">
        Apple TTML Lyrics Processor
    </h1>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('json')">Paste JSON Output</button>
            <button class="tab-btn" onclick="switchTab('api')">Fetch via Lyrics API</button>
        </div>

        <label class="checkbox-group">
            <input type="checkbox" id="keep-bg-vocals" checked>
            Include Background Vocals (<code>ttm:role="x-bg"</code>)
        </label>

        <div id="json-section">
            <div class="form-group">
                <label for="json-input">Paste raw JSON payload here</label>
                <textarea id="json-input" placeholder='{\n  "ttml": "<?xml version=\"1.0\"...",\n  "processingTime": ...\n}'></textarea>
            </div>
            <button class="action-btn" onclick="processJSON()">Extract TTML Document</button>
        </div>

        <div id="api-section" style="display: none;">
            <div class="form-group">
                <label>Fetch Parameters</label>
                <div class="input-row">
                    <input type="text" id="api-artist" placeholder="Artist (e.g., Madonna)">
                    <input type="text" id="api-title" placeholder="Song Title (e.g., Bring Your Love)">
                </div>
            </div>
            <button class="action-btn" onclick="fetchFromAPI()">Fetch and Extract</button>
        </div>

        <div id="error-message" class="error"></div>
    </div>

    <div id="output-section" class="card" style="display: none;">
        <div class="output-header">
            <label>Valid Apple Audio TTML Output Document</label>
            <button class="copy-btn" id="main-copy" onclick="copyToClipboard(document.getElementById('ttml-output').innerText, this)">Copy Whole Document</button>
        </div>
        <div class="code-container">
            <pre id="ttml-output"></pre>
        </div>

        <div class="split-controls">
            <button class="split-btn" onclick="splitTtml()">Split into 2 Parts (Android Safe)</button>
            <button class="copy-btn" id="copy-part1" style="display:none;" onclick="copyPart(1, this)">Copy Part 1</button>
            <button class="copy-btn" id="copy-part2" style="display:none;" onclick="copyPart(2, this)">Copy Part 2</button>
        </div>

        <div id="lyrics-preview" class="preview-container">
            <div class="song-meta" id="meta-output"></div>
            <div id="lines-output"></div>
        </div>
    </div>
</div>

<script>
    let part1Text = "";
    let part2Text = "";

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (tab === 'json') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('json-section').style.display = 'block';
            document.getElementById('api-section').style.display = 'none';
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('json-section').style.display = 'none';
            document.getElementById('api-section').style.display = 'block';
        }
    }

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        if(msg) {
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        } else {
            errDiv.style.display = 'none';
        }
    }

    function formatXml(xml) {
        let formatted = '';
        let reg = /(>)(<)(\/*)(head|body|div|p|tt|metadata|songwriters|songwriter|iTunesMetadata)/g;
        xml = xml.replace(reg, '$1\r\n$2$3$4');
        let pad = 0;
        
        xml.split('\r\n').forEach(function(node) {
            let indent = 0;
            if (node.match( /.+<\/(head|body|div|p|tt|metadata|songwriters|songwriter|iTunesMetadata)[^>]*>$/ )) {
                indent = 0;
            } else if (node.match( /^<\/(head|body|div|p|tt|metadata|songwriters|songwriter|iTunesMetadata)/ )) {
                if (pad != 0) pad -= 1;
            } else if (node.match( /^<(head|body|div|p|tt|metadata|songwriters|songwriter|iTunesMetadata)[^>]*[^\/]>/ )) {
                indent = 1;
            } else {
                indent = 0;
            }

            let padding = '';
            for (let i = 0; i < pad; i++) padding += '  ';
            formatted += padding + node + '\r\n';
            pad += indent;
        });
        return formatted.trim();
    }

    function renderDisplay(rawTtml, meta) {
        showError(null);
        document.getElementById('copy-part1').style.display = 'none';
        document.getElementById('copy-part2').style.display = 'none';
        part1Text = "";
        part2Text = "";

        let cleanTtml = rawTtml;
        if (!cleanTtml.endsWith('</tt>')) {
            if (cleanTtml.includes('</body>')) cleanTtml += '</tt>';
            else if (cleanTtml.includes('</div>')) cleanTtml += '</body></tt>';
            else if (cleanTtml.includes('</p>')) cleanTtml += '</div></body></tt>';
        }

        const includeBgVocals = document.getElementById('keep-bg-vocals').checked;
        if (!includeBgVocals) {
            cleanTtml = cleanTtml.replace(/<span[^>]*ttm:role="x-bg"[\s\S]*?<\/span>/g, '');
        }

        const prettyXML = formatXml(cleanTtml);
        document.getElementById('ttml-output').innerText = prettyXML;
        
        if(meta) {
            document.getElementById('meta-output').innerHTML = `<strong>Asset Profile:</strong> ${meta.artist} - ${meta.title} (${meta.album || 'Single'})`;
        } else {
            document.getElementById('meta-output').innerHTML = `<strong>Asset Profile:</strong> Apple TTML Document Engine`;
        }

        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(cleanTtml, "text/xml");
        const paragraphs = xmlDoc.getElementsByTagName("p");
        
        let lyricsHtml = "";
        for (let p of paragraphs) {
            let lineHtml = "";
            
            for(let child of p.childNodes) {
                if (child.nodeType === Node.ELEMENT_NODE && child.tagName === "span") {
                    if (child.getAttribute("ttm:role") === "x-bg") {
                        lineHtml += `<span class="bg-vocal-text">${child.textContent}</span>`;
                    } else {
                        lineHtml += child.textContent;
                    }
                } else if (child.nodeType === Node.TEXT_NODE) {
                    lineHtml += child.textContent;
                }
            }
            
            const agent = p.getAttribute("ttm:agent") || "v1";
            if(lineHtml.trim()) {
                lyricsHtml += `<div class="lyrics-line"><strong>[${agent}]</strong> ${lineHtml}</div>`;
            }
        }
        
        document.getElementById('lines-output').innerHTML = lyricsHtml || "No active elements processed.";
        document.getElementById('output-section').style.display = 'block';
    }

    function splitTtml() {
        const fullText = document.getElementById('ttml-output').innerText;
        if (!fullText) return;

        const midPoint = Math.floor(fullText.length / 2);
        const nextNewLine = fullText.indexOf('\n', midPoint);
        
        if (nextNewLine !== -1) {
            part1Text = fullText.substring(0, nextNewLine);
            part2Text = fullText.substring(nextNewLine);
        } else {
            part1Text = fullText.substring(0, midPoint);
            part2Text = fullText.substring(midPoint);
        }

        document.getElementById('copy-part1').style.display = 'inline-block';
        document.getElementById('copy-part2').style.display = 'inline-block';
        alert("Text broken successfully! Use the 'Copy Part 1' and 'Copy Part 2' buttons below.");
    }

    function copyPart(partNumber, buttonElement) {
        const textToCopy = partNumber === 1 ? part1Text : part2Text;
        copyToClipboard(textToCopy, buttonElement);
    }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const oldText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => { btn.innerText = oldText; }, 2000);
        });
    }

    function processJSON() {
        const inputData = document.getElementById('json-input').value.trim();
        if(!inputData) return showError("Please input a valid JSON string payload.");

        try {
            const parsed = JSON.parse(inputData);
            if (!parsed.ttml) {
                throw new Error("Missing structural property element 'ttml' in JSON payload.");
            }
            const meta = parsed.processingTime ? parsed.processingTime.cachedMeta : null;
            renderDisplay(parsed.ttml, meta);
        } catch(e) {
            showError("Invalid JSON structure format: " + e.message);
        }
    }

    async function fetchFromAPI() {
        const artist = encodeURIComponent(document.getElementById('api-artist').value.trim());
        const title = encodeURIComponent(document.getElementById('api-title').value.trim());
        if(!artist || !title) return showError("Both Title and Artist strings must be filled.");
        
        showError("Fetching remote endpoint asset streams...");
        try {
            const targetUrl = `https://lyrics.geeked.wtf/v1/ttml/get?title=${title}&artist=${artist}`;
            const response = await fetch(targetUrl);
            if(!response.ok) throw new Error("HTTP connection error state target " + response.status);
            
            const data = await response.json();
            if(data && data.ttml) {
                const meta = data.processingTime ? data.processingTime.cachedMeta : { artist: decodeURIComponent(artist), title: decodeURIComponent(title) };
                renderDisplay(data.ttml, meta);
            } else {
                throw new Error("Response body returned empty data fields.");
            }
        } catch(e) {
            showError("Network asset error pipeline breakdown: " + e.message + ". If CORS errors occur, paste the JSON output manually instead.");
        }
    }
</script>
</body>
</html>
